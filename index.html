<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Majulix Opal Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Roboto+Condensed:wght@300;400&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth;}

        :root {
            --dark-brown : #443025;
            --text-brown : #765340;
            --accent-brown : #A08679;
            --support : #BCA89F;
            --support2 : #D8CBC3;
            --background : #F4F1EE;
            --white : #FFFFFF;
        }

        body {
            background-color: var(--background);
            color: var(--text-brown);

        }

        header {
            padding: 0 2.5rem;
        }

        .header-inner{
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--dark-brown);
            border-radius: 35px;
            padding: 0.7rem 1.6rem;
            margin: 1rem 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 0.5rem 0 1rem;
        }

        nav a{
            text-decoration: none;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0px;
            font-style: bold;
            color: var(--text-brown);
            padding: 0.4rem 1.2rem;
        }

        nav a:hover{
            background-color: var(--support2);
        }

        h1 {
            font-family: 'Playfair Display' serif;
            font-size: 3rem;
            font-weight: normal;
            font-style: italic;
            justify-content: space-between;
        }

        h2 {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0px;
            font-style: bold;
            justify-content: space-between;
        }
    </style>
    
  </head>
  <body>
    <header>
        <div class="header-inner">
            <img src="images/logo.png" width="150px" height="auto">
        </div>
        <nav>
            <a href="#">RINGS</a>
            <a href="#">EARRINGS</a>
            <a href="#">BRACELETS</a>
            <a href="#">NECKLACES</a>
        </nav>
    </header>

    <h1> OPAL IN THE LIGHT </h1>
  </body>
</html>
